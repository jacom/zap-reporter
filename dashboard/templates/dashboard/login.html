{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — VA Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body class="login-body">
    <div class="bg-grid-overlay"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <i class="bi bi-shield-check"></i>
                <h1>VA Platform</h1>
                <p>Hospital Vulnerability Assessment</p>
            </div>

            {% if form.errors %}
            <div class="alert alert-danger">
                <i class="bi bi-exclamation-triangle me-1"></i>
                Invalid username or password.
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label">
                        <i class="bi bi-person me-1"></i>Username
                    </label>
                    <input type="text" name="username" id="id_username" class="form-control"
                           placeholder="Enter username" autofocus required>
                </div>
                <div class="mb-4">
                    <label for="id_password" class="form-label">
                        <i class="bi bi-lock me-1"></i>Password
                    </label>
                    <input type="password" name="password" id="id_password" class="form-control"
                           placeholder="Enter password" required>
                </div>
                {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
                {% endif %}
                <button type="submit" class="btn btn-primary w-100 login-btn">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
                </button>
            </form>

            <div class="login-footer">
                <small>Hospital VA Platform v1.0</small>
            </div>
        </div>
    </div>
</body>
</html>
